<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Ethereal 3D Birthday ✨</title>
<style>
:root {
    --bg-color: #0b0914;
    --neon-pink: #ff2a75;
    --neon-purple: #8c1eff;
    --neon-blue: #00e5ff;
    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.15);
}

/* General */
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-color);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    perspective: 1200px;
}

/* Fireflies */
.firefly {
    position: absolute;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px 2px white;
    animation: drift 10s infinite linear;
    pointer-events: none;
    opacity: 0.7;
}
@keyframes drift {
    0% { transform: translateY(100vh) translateX(-20px) scale(0); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(20px) scale(1); opacity: 0; }
}

/* Orbs */
.orb {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, #fff, transparent);
    opacity: 0.4;
    pointer-events: none;
    animation: orbDrift linear infinite;
}
@keyframes orbDrift {
    0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-20vh) translateX(100px) scale(1); opacity: 0; }
}

/* Snowflakes */
.snowflake {
    position: absolute;
    top: -10px;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    animation-name: fallSnow;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}
@keyframes fallSnow {
    0% { transform: translateY(-10px) translateX(0) rotate(0deg); opacity: 0; }
    20% { opacity: 0.8; }
    100% { transform: translateY(110vh) translateX(30px) rotate(360deg); opacity: 0; }
}

/* Title */
h1 {
    margin-top: 5vh;
    font-size: 2rem; /* багасгасан */
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(45deg, #fff, var(--neon-pink), var(--neon-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 15px rgba(255,42,117,0.6));
    z-index: 10;
    animation: pulseText 3s infinite alternate;
    position: relative;
    overflow: visible;
}
h1::after {
    content:'';
    position:absolute;
    top:-10px; left:-20px; width:150%; height:50%;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
    filter: blur(30px);
    transform: rotate(25deg);
}
@keyframes pulseText {
    from { filter: drop-shadow(0 0 10px rgba(255,42,117,0.3)); }
    to { filter: drop-shadow(0 0 25px rgba(255,42,117,0.8)); }
}

/* Gallery Stage */
.gallery-stage {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
}
.hanging-photo {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: floatingLuxury var(--speed) ease-in-out infinite alternate;
    transform-origin: center center;
    perspective: 1000px;
}
.photo-string {
    width: 2px;
    height: var(--h);
    margin-top: calc(-1 * var(--h));
    background: linear-gradient(to bottom, transparent, var(--neon-blue));
    box-shadow: 0 0 10px var(--neon-blue);
}
.img-frame {
    width: 140px;
    height: 140px;
    border-radius: 16px;
    padding: 6px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    object-fit: cover;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.6s;
}
.img-frame:hover {
    transform: scale(1.4) rotateY(20deg) rotateX(10deg) translateY(-10px);
    border-color: var(--neon-pink);
    box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255,42,117,0.8);
    z-index: 100;
}

/* Floating Animation */
@keyframes floatingLuxury {
    0% { transform: rotateY(-5deg) rotateX(-3deg) translateY(0) translateX(0) scale(0.95); }
    25% { transform: rotateY(5deg) rotateX(3deg) translateY(-10px) translateX(5px) scale(1); }
    50% { transform: rotateY(-4deg) rotateX(-2deg) translateY(-5px) translateX(-5px) scale(1.05); }
    75% { transform: rotateY(6deg) rotateX(4deg) translateY(-12px) translateX(3px) scale(1); }
    100% { transform: rotateY(-5deg) rotateX(-3deg) translateY(0) translateX(0) scale(0.95); }
}

/* Cake & Candle */
.cake-container { position: absolute; bottom: 12vh; display: flex; flex-direction: column; align-items: center; z-index: 10; }
.tier { position: relative; border-radius: 50% / 25px; display: flex; justify-content: center; }
.tier::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50px; border-radius: 50%; background: inherit; filter: brightness(1.3); }
.tier-1 { width: 260px; height: 90px; background: linear-gradient(to right, #2a0845, #6441A5, #2a0845); box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.5); z-index:1; }
.tier-2 { width: 200px; height: 80px; margin-bottom: -30px; background: linear-gradient(to right, #ff0f7b, #f89b29, #ff0f7b); z-index:2; }
.tier-3 { width: 140px; height: 70px; margin-bottom: -25px; background: linear-gradient(to right, #f6f6f6, #dcdcdc, #f6f6f6); box-shadow: 0 0 20px rgba(255,255,255,0.4); z-index:3; }
.tier-3::before { background: #ffffff; }
.neon-candle { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 8px; height: 60px; background: linear-gradient(to bottom, #fff, var(--neon-blue)); border-radius: 4px; box-shadow: 0 0 10px var(--neon-blue); z-index:10; }
.neon-flame { position: absolute; top: -30px; left: -6px; width: 20px; height: 35px; background: #fff; border-radius: 50% 50% 20% 20%; box-shadow: 0 0 10px #fff, 0 0 20px #ffea00, 0 0 40px #ff5100, 0 0 60px #ff0055; animation: flameFlicker 0.08s infinite alternate; }
@keyframes flameFlicker { from { transform: scale(0.95) rotate(-1deg); } to { transform: scale(1.05) rotate(1deg); } }

/* Controls */
.controls { position: fixed; bottom: 4vh; display: flex; gap: 20px; z-index: 100; }
.glass-btn { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: white; padding: 12px 30px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
.glass-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255,42,117,0.4); transform: translateY(-3px); }

/* Particle & Greeting */
.particle { position: absolute; border-radius: 50%; pointer-events: none; }
.greetingText { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 1.5rem; font-weight: 900; text-shadow: 0 0 10px #ff2a75, 0 0 15px #8c1eff, 0 0 20px #00e5ff; opacity: 0; transition: opacity 1s linear; z-index: 999; pointer-events: none; }
</style>
</head>
<body>

<h1 id="titleText">Happy Birthday</h1>
<div class="gallery-stage" id="gallery"></div>

<div class="cake-container">
    <div class="tier tier-3">
        <div class="neon-candle"><div class="neon-flame" id="flame"></div></div>
    </div>
    <div class="tier tier-2"></div>
    <div class="tier tier-1"></div>
</div>

<div class="controls">
    <button class="glass-btn" onclick="toggleMusic()">🎵 Төрсөн өдрийн дуу</button>
    <button class="glass-btn" onclick="blowCandle()">🌬️ Та лаагаа үлээнэ үү</button>
</div>

<audio id="bgm" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// Fireflies
for(let i=0;i<40;i++){
    let f=document.createElement('div');
    f.className='firefly';
    f.style.width=Math.random()*4+2+'px';
    f.style.height=f.style.width;
    f.style.left=Math.random()*100+'vw';
    f.style.animationDuration=(Math.random()*10+5)+'s';
    f.style.animationDelay=(Math.random()*5)+'s';
    f.style.boxShadow=`0 0 ${5+Math.random()*15}px ${['#ff2a75','#8c1eff','#00e5ff'][Math.floor(Math.random()*3)]}`;
    document.body.appendChild(f);
}

// Orbs
for(let i=0;i<30;i++){
    let o=document.createElement('div');
    o.className='orb';
    let size=Math.random()*60+20;
    o.style.width=o.style.height=size+'px';
    o.style.left=Math.random()*100+'vw';
    o.style.top=Math.random()*100+'vh';
    o.style.animationDuration=(20+Math.random()*20)+'s';
    document.body.appendChild(o);
}

// Snowflakes
for(let i=0;i<80;i++){
    let s=document.createElement('div');
    s.className='snowflake';
    let size=Math.random()*6+2;
    s.style.width=s.style.height=size+'px';
    s.style.left=Math.random()*100+'vw';
    s.style.animationDuration=(5+Math.random()*10)+'s';
    s.style.opacity=Math.random()*0.8+0.2;
    document.body.appendChild(s);
}

// Gallery
const gallery=document.getElementById('gallery');
const photos=[
"https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=200&q=80",
"https://images.unsplash.com/photo-1530103862676-de8892bc952f?auto=format&w=200&q=80",
"https://images.unsplash.com/photo-1464349153735-7db50ed83c84?auto=format&w=200&q=80",
"https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&w=200&q=80",
"https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&w=200&q=80",
"https://images.unsplash.com/photo-1513271732506-695027cb4bc0?auto=format&w=200&q=80"
];
photos.forEach((src,i)=>{
    const div=document.createElement('div');
    div.className='hanging-photo';
    const xPos=5+(i*15); 
    const stringHeight=80+Math.random()*200;
    const floatSpeed=6+Math.random()*5;
    div.style.left=`${xPos}%`;
    div.style.top=`${stringHeight}px`;
    div.style.setProperty('--h',`${stringHeight}px`);
    div.style.setProperty('--speed',`${floatSpeed}s`);
    const rotation=Math.random()*10-5;
    div.innerHTML=`<div class="photo-string"></div><img src="${src}" class="img-frame" style="transform: rotate(${rotation}deg)">`;
    gallery.appendChild(div);
});

// Candle blow
function blowCandle(){
    const flame=document.getElementById('flame');
    flame.style.opacity='0';
    flame.style.transform='scale(0)';
    
    const greetings = ["🎉Төрсөн өдрийн мэнд! Чи бол өөрийнхөө ертөнцийн цорын ганц гол дүр. Энэ шинэ нас чинь чамд илүү их боломж, хязгааргүй адал явдал, бас хамгийн гол нь өөрийнхөө хүслээр амьдрах эрч хүчийг авчрах болтугай. Чи байгаа газар үргэлж гэрэлтэж байдаг шүү. Хамгийн шилдэг нь байж, өөртөө итгэлтэйгээр урагшлаарай🎂"];
    const greetingText = document.createElement('div');
    greetingText.className='greetingText';
    greetingText.innerText = greetings[Math.floor(Math.random()*greetings.length)];
    document.body.appendChild(greetingText);
    
    setTimeout(()=>greetingText.style.opacity='1',100);
    createExplosion();

    // 1 минут дараа алга болно
    setTimeout(()=>{
        greetingText.style.opacity='0';
        setTimeout(()=>greetingText.remove(),1000);
        flame.style.opacity='1';
        flame.style.transform='scale(1)';
    },60000);
}

// Explosion particles
function createExplosion(){
    const colors=['#ff2a75','#8c1eff','#00e5ff','#ffffff','#ffea00'];
    for(let i=0;i<150;i++){
        const p=document.createElement('div');
        p.className='particle';
        p.style.background=colors[Math.floor(Math.random()*colors.length)];
        p.style.width=(Math.random()*6+2)+'px';
        p.style.height=p.style.width;
        p.style.left='50%';
        p.style.top='70%';
        p.style.position='fixed';
        p.style.borderRadius='50%';
        p.style.pointerEvents='none';
        document.body.appendChild(p);
        const tx=(Math.random()-0.5)*window.innerWidth;
        const ty=(Math.random()-1)*window.innerHeight;
        p.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${tx}px,${ty}px) scale(0)`,opacity:0}],
            {duration:1500+Math.random()*2000,easing:'cubic-bezier(0,.9,.57,1)'}
        ).onfinish=()=>p.remove();
    }
}

// Music toggle
let isPlaying=false;
function toggleMusic(){
    const audio=document.getElementById('bgm');
    isPlaying?audio.pause():audio.play();
    isPlaying=!isPlaying;
}
</script>
</body>
</html>
